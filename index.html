<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Үг Цээжлэх Карт</title>
<style>


  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card-front: #1e2235;
    --card-back: #1a2e1a;
    --accent: #7ecf8e;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: #2d3148;
    --tag-bg: #252840;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  header p {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* CARD FLIP */
  .card-scene {
    width: 100%;
    max-width: 420px;
    height: 260px;
    perspective: 900px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }

  .card-scene.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    border: 1px solid var(--border);
    gap: 10px;
  }

  .card-front {
    background: var(--card-front);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    border-color: #2a4d2a;
  }

  .kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    text-align: center;
  }

  .romaji {
    font-size: 0.85rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
  }

  .btn-speak {
    background: #1e2a40;
    color: var(--accent2);
    border: 1px solid #3a3d6b;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 7px 18px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }

  .btn-speak:hover { background: #252e50; border-color: var(--accent2); }
  .btn-speak.speaking { background: #2a1e40; color: #c084fc; border-color: #7c3aed; animation: pulse 0.8s infinite alternate; }

  @keyframes pulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }

  .meaning {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    line-height: 1.4;
  }

  .example {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 420px;
    justify-content: center;
  }

  button {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.85rem;
    transition: all 0.15s;
    padding: 10px 22px;
  }

  button:active { transform: scale(0.96); }

  .btn-prev {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    flex: 1;
  }

  .btn-prev:hover { color: var(--text); border-color: var(--accent2); }

  .btn-flip {
    background: var(--accent);
    color: #0f1117;
    flex: 2;
  }

  .btn-flip:hover { background: #9bdfaa; }

  .btn-next {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    flex: 1;
  }

  .btn-next:hover { color: var(--text); border-color: var(--accent); }

  /* SCORE */
  .score-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 420px;
    justify-content: center;
  }

  .btn-know {
    background: #1a3a1a;
    color: var(--accent);
    border: 1px solid #2d5e2d;
    flex: 1;
    padding: 9px;
    font-size: 0.8rem;
  }

  .btn-know:hover { background: #1f4a1f; }

  .btn-dontknow {
    background: #2a1a1a;
    color: #f87171;
    border: 1px solid #5e2d2d;
    flex: 1;
    padding: 9px;
    font-size: 0.8rem;
  }

  .btn-dontknow:hover { background: #3a1f1f; }

  /* WORD LIST */
  .word-list-toggle {
    font-size: 0.75rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 16px;
    display: block;
  }

  .word-list-toggle:hover { color: var(--text); border-color: var(--accent2); }

  .word-grid {
    display: none;
    width: 100%;
    max-width: 420px;
    flex-direction: column;
    gap: 4px;
  }

  .word-grid.open { display: flex; }

  .word-item {
    display: flex;
    align-items: center;
    gap: 10px;    
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .word-item:hover { border-color: var(--accent2); }

  .word-item.active { border-color: var(--accent); background: #1a2535; }

  .word-item.known { border-color: #2d5e2d; }
  .word-item.unknown { border-color: #5e2d2d; }

  .wi-kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    min-width: 130px;
    color: var(--text);
  }

  .wi-mn {
    font-size: 0.78rem;
    color: var(--muted);
    flex: 1;
  }

  .wi-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .word-item.known .wi-dot { background: var(--accent); }
  .word-item.unknown .wi-dot { background: #f87171; }

  .stats {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 420px;
    justify-content: center;
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stats span b {
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <h1>日本語 · Үйлдвэрийн Нэр Томьёо</h1>
  <p>Картыг дарж эргүүлэх · Монгол утгыг шалгах</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="card-counter">1 / 24</span>
    <span id="mastered-count">Цээжилсэн: 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:4%"></div></div>
</div>

<div class="card-scene" id="card-scene" onclick="toggleFlip()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front">
      <div class="kana" id="kana-text"></div>
      <div class="romaji" id="romaji-text"></div>
      <button class="btn-speak" id="speak-btn" onclick="event.stopPropagation(); speakCurrent()">🔊 Сонсох</button>
      <div class="hint">👆 дарж утгыг шалгах</div>
    </div>
    <div class="card-face card-back">
      <div class="meaning" id="meaning-text"></div>
      <div class="example" id="example-text"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-prev" onclick="navigate(-1)">← Өмнөх</button>
  <button class="btn-flip" onclick="toggleFlip()">Эргүүлэх 🔄</button>
  <button class="btn-next" onclick="navigate(1)">Дараах →</button>
</div>

<div class="score-row">
  <button class="btn-dontknow" onclick="markCard(false)">✗ Мэдэхгүй</button>
  <button class="btn-know" onclick="markCard(true)">✓ Мэдэх</button>
</div>

<button class="word-list-toggle" onclick="toggleList()">📋 Бүх үгсийн жагсаалт</button>

<div class="word-grid" id="word-grid"></div>

<div class="stats">
  <span>Нийт: <b>24</b></span>
  <span>Мэдэх: <b id="s-know">0</b></span>
  <span>Мэдэхгүй: <b id="s-dontknow">0</b></span>
</div>

<script>
const cards = [
  { kana: "あんぜんさく", romaji: "anzensaku", meaning: "Аюулгүйн хаалт / хамгаалалт / хашлага", example: "安全柵 — Аюулгүйн хашлага" },
  { kana: "いじょう", romaji: "ijou", meaning: "Хэвийн бус / гэмтэл / согог", example: "異常 — Гэмтэл, согог илрүүлэх" },
  { kana: "えりあせんさー", romaji: "eria sensaa", meaning: "Талбайн мэдрэгч", example: "エリアセンサー — Хүрэх хүрэм хориглох" },
  { kana: "おうえん", romaji: "ouen", meaning: "Тусламж / дэмжлэг", example: "応援 — Нэмэлт тусламж хүсэх" },
  { kana: "かこう", romaji: "kakou", meaning: "Боловсруулах / засах", example: "加工 — Материал боловсруулах" },
  { kana: "かたざい", romaji: "katazai", meaning: "Хэлбэрт оруулсан түүхий эд", example: "型材 — Хэвэнд тохирсон материал" },
  { kana: "かながた", romaji: "kanagata", meaning: "Хэв / хэвэнд оруулахад ашигладаг хэв", example: "金型 — Хэвлэлийн хэлбэр" },
  { kana: "ぶひんづけ", romaji: "buhinzuke", meaning: "Сэлбэг угсрах", example: "部品付け — Хэсгүүдийг нэгтгэх" },
  { kana: "けっしょく", romaji: "kesshoku", meaning: "Багцалж боох", example: "結束 — Бүтээгдэхүүн боох" },
  { kana: "げんいち", romaji: "gen'ichi", meaning: "Анхны байршил", example: "原位置 — Буцах эхлэлийн цэг" },
  { kana: "げんてん", romaji: "genten", meaning: "Эхлэл цэг", example: "原点 — Хэмжилтийн тэг цэг" },
  { kana: "こんべっくす", romaji: "konbekkusu", meaning: "Метр (хэмжүүр)", example: "コンベックス — Уян хэмжүүр" },
  { kana: "こんぼう", romaji: "konbou", meaning: "Ачих / хайрцаглах", example: "梱包 — Тээврийн боодол" },
  { kana: "さいくるたいむ", romaji: "saikuru taimu", meaning: "Процессын үргэлжлэх хугацаа", example: "サイクルタイム — Нэг мөчлөгийн хугацаа" },
  { kana: "さくばん", romaji: "sakuban", meaning: "Үйлдвэрлэлийн дугаар", example: "作番 — Даалгаврын дугаар" },
  { kana: "さんえず", romaji: "sanezu", meaning: "Эмхлэх / цэгцлэх / цэвэрлэх", example: "三S — Seiri, Seiton, Seisou" },
  { kana: "ふそくざい", romaji: "fusokuzai", meaning: "Дутуу материал", example: "不足材 — Хангалтгүй материал" },
  { kana: "ぶひん", romaji: "buhin", meaning: "Сэлбэг эд анги", example: "部品 — Нэг бүрийн хэсэг" },
  { kana: "ふりょう", romaji: "furyou", meaning: "Доголдолтой / гэмтэлтэй", example: "不良 — Чанарын алдаа" },
  { kana: "ふりょうざい", romaji: "furyouzai", meaning: "Гэмтэлтэй эд анги", example: "不良材 — Эргүүлэн шалгах материал" },
  { kana: "ぽかよけ", romaji: "pokayoke", meaning: "Алдаанаас урьдчилан сэргийлэх", example: "ポカよけ — Fool-proof систем" },
  { kana: "もらーる", romaji: "moraaru", meaning: "Ажил хийх урам / зориг", example: "モラール — Багийн урам зориг" },
  { kana: "れいあうと", romaji: "reiauto", meaning: "Зохион байгуулалт", example: "レイアウト — Ажлын байрны зохицуулалт" },
  { kana: "わんさいくる", romaji: "wan saikuru", meaning: "Ажлын нэг цикл", example: "ワンサイクル — Бүтэн нэг мөчлөг" },
];

let currentUtterance = null;

let current = 0;

function speakCurrent() {
  const c = cards[current];
  if (!window.speechSynthesis) {
    alert('Таны браузер дуу дэмждэггүй байна.');
    return;
  }
  // stop if already speaking
  window.speechSynthesis.cancel();
  const btn = document.getElementById('speak-btn');

  const utter = new SpeechSynthesisUtterance(c.kana);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1.0;

  utter.onstart = () => { btn.classList.add('speaking'); btn.textContent = '🔊 ...'; };
  utter.onend = () => { btn.classList.remove('speaking'); btn.textContent = '🔊 Сонсох'; };
  utter.onerror = () => { btn.classList.remove('speaking'); btn.textContent = '🔊 Сонсох'; };

  window.speechSynthesis.speak(utter);
  currentUtterance = utter;
}


let flipped = false;
let status = new Array(cards.length).fill(null); // null | true | false

function render() {
  const c = cards[current];
  document.getElementById('kana-text').textContent = c.kana;
  document.getElementById('romaji-text').textContent = c.romaji;
  document.getElementById('meaning-text').textContent = c.meaning;
  document.getElementById('example-text').textContent = c.example;
  document.getElementById('card-counter').textContent = `${current + 1} / ${cards.length}`;
  const known = status.filter(s => s === true).length;
  document.getElementById('mastered-count').textContent = `Цээжилсэн: ${known}`;
  document.getElementById('prog-fill').style.width = `${((current + 1) / cards.length) * 100}%`;
  document.getElementById('s-know').textContent = status.filter(s => s === true).length;
  document.getElementById('s-dontknow').textContent = status.filter(s => s === false).length;
  // reset flip
  flipped = false;
  document.getElementById('card-scene').classList.remove('flipped');
  window.speechSynthesis && window.speechSynthesis.cancel();
  const btn = document.getElementById('speak-btn');
  if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊 Сонсох'; }
  renderList();
}

function toggleFlip() {
  flipped = !flipped;
  document.getElementById('card-scene').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  current = (current + dir + cards.length) % cards.length;
  render();
}

function markCard(known) {
  status[current] = known;
  render();
  setTimeout(() => navigate(1), 300);
}

function toggleList() {
  const g = document.getElementById('word-grid');
  g.classList.toggle('open');
}

function renderList() {
  const g = document.getElementById('word-grid');
  g.innerHTML = '';
  cards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'word-item' +
      (i === current ? ' active' : '') +
      (status[i] === true ? ' known' : '') +
      (status[i] === false ? ' unknown' : '');
    div.innerHTML = `<span class="wi-dot"></span><span class="wi-kana">${c.kana}</span><span class="wi-mn">${c.meaning.split('/')[0].trim()}</span>`;
    div.onclick = () => { current = i; render(); };
    g.appendChild(div);
  });
}

// keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); toggleFlip(); }
  else if (e.key === 's') speakCurrent();
  else if (e.key === 'k') markCard(true);
  else if (e.key === 'x') markCard(false);
});

render();
</script>
</body>
</html>
